name: Build and Deploy ASP.NET App to Azure

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: ngmhs-social-digital-hub
  DOTNET_VERSION: '6.0.x'  # change if your project uses 7 or 8

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore NGMHS.sln

    - name: Build
      run: dotnet build NGMHS.sln --configuration Release --no-restore

    - name: Publish
      run: dotnet publish NGMHS.sln -c Release -o publish

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
